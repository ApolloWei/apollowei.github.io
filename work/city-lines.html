<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Apollo 航拍作品 City Lines。" data-i18n-content="meta.cityDescription">
  <title>City Lines | Apollo</title>
  <link rel="stylesheet" href="../styles.css">
  <script>window.APOLLO_PROTECTED = true;</script>
  <script src="../auth.js"></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../hall.html" aria-label="Apollo 主页" data-i18n-aria-label="nav.homeLabel">Apollo</a>
    <nav class="nav" aria-label="主导航" data-i18n-aria-label="nav.label">
      <a href="../hall.html#works" data-i18n="nav.works">作品</a>
      <a href="../hall.html#about" data-i18n="nav.about">关于</a>
      <a href="../hall.html#contact" data-i18n="nav.contact">联系</a>
      <a class="manager-link" href="../admin.html" data-i18n="nav.admin">我是管理者</a>
      <div class="language-switch" aria-label="语言切换" data-i18n-aria-label="language.switchLabel">
        <button type="button" data-lang-button="zh">中文</button>
        <button type="button" data-lang-button="en">EN</button>
      </div>
    </nav>
  </header>

  <main class="work-page">
    <section class="work-hero">
      <div>
        <p class="eyebrow" data-i18n="work.eyebrow">Aerial Work</p>
        <h1>City Lines</h1>
        <div class="work-meta">
          <span data-i18n="work.city">城市</span>
          <span data-i18n="work.geometry">几何</span>
          <span>03:18</span>
        </div>
        <div class="page-actions">
          <a class="button primary" href="../hall.html#works" data-i18n="work.back">返回作品</a>
          <a class="button secondary" href="mailto:apollo@example.com" data-i18n="work.contact">联系 Apollo</a>
        </div>
      </div>
      <div class="media-frame">
        <div class="media-placeholder city">
          <p data-i18n="work.cityPlaceholder">把真实视频放到 assets/videos/city-lines.mp4 后，可在这里替换为 video 标签。</p>
        </div>
      </div>
    </section>

    <section class="story-grid">
      <dl>
        <div>
          <dt data-i18n="work.location">地点</dt>
          <dd>Urban Grid</dd>
        </div>
        <div>
          <dt data-i18n="work.gear">设备</dt>
          <dd>Drone Camera</dd>
        </div>
        <div>
          <dt data-i18n="work.status">状态</dt>
          <dd data-i18n="work.statusValue">示例作品页</dd>
        </div>
      </dl>
      <div class="story-text">
        <p data-i18n="work.cityStory1">
          这一页适合放城市航拍：俯视道路、桥梁、楼群和光影。简约布局会把注意力留给视频本身。
        </p>
        <p data-i18n="work.cityStory2">
          后续可以扩展为照片组、视频嵌入、地图位置或拍摄日志。
        </p>
      </div>
    </section>

    <section class="comments-section" aria-labelledby="comments-title">
      <p class="eyebrow" data-i18n="comments.eyebrow">Comments</p>
      <h2 id="comments-title" data-i18n="comments.title">留言评价</h2>
      <div class="comments-box" data-comments></div>
    </section>
  </main>
  <script src="../language.js"></script>
  <script src="../comments.js"></script>
</body>
</html>
