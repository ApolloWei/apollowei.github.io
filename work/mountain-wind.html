<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Apollo 航拍作品 Mountain Wind。">
  <title>Mountain Wind | Apollo</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html">Apollo</a>
    <nav class="nav" aria-label="主导航">
      <a href="../index.html#works">作品</a>
      <a href="../index.html#about">关于</a>
      <a href="../index.html#contact">联系</a>
    </nav>
  </header>

  <main class="work-page">
    <section class="work-hero">
      <div>
        <p class="eyebrow">Aerial Work</p>
        <h1>Mountain Wind</h1>
        <div class="work-meta">
          <span>山野</span>
          <span>清晨</span>
          <span>05:06</span>
        </div>
        <div class="page-actions">
          <a class="button primary" href="../index.html#works">返回作品</a>
          <a class="button secondary" href="mailto:apollo@example.com">联系 Apollo</a>
        </div>
      </div>
      <div class="media-frame">
        <div class="media-placeholder mountain">
          <p>把真实视频放到 assets/videos/mountain-wind.mp4 后，可在这里替换为 video 标签。</p>
        </div>
      </div>
    </section>

    <section class="story-grid">
      <dl>
        <div>
          <dt>地点</dt>
          <dd>Mountain Ridge</dd>
        </div>
        <div>
          <dt>设备</dt>
          <dd>Drone Camera</dd>
        </div>
        <div>
          <dt>状态</dt>
          <dd>示例作品页</dd>
        </div>
      </dl>
      <div class="story-text">
        <p>
          这一页用于山野航拍作品。可以记录晨雾、山脊、风向、飞行高度，以及画面从低处到开阔视野的变化。
        </p>
        <p>
          真实内容就位后，页面会更像一篇简短的影像手记。
        </p>
      </div>
    </section>
