<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Apollo 航拍影像网站访问入口。" data-i18n-content="meta.gateDescription">
  <title>Apollo | Private Access</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="gate-body">
  <main class="gate-page" aria-labelledby="gate-title">
    <section class="gate-panel">
      <div>
        <p class="eyebrow" data-i18n="gate.eyebrow">Private Portfolio</p>
        <h1 id="gate-title" data-i18n="gate.title">Apollo 航拍大厅</h1>
        <p class="gate-text" data-i18n="gate.text">请输入访问密码，进入作品大厅和视频页面。</p>
      </div>

      <form class="gate-form" data-password-form>
        <label for="site-password" data-i18n="gate.passwordLabel">访问密码</label>
        <input id="site-password" name="password" type="password" autocomplete="current-password" data-password-input required>
        <p class="gate-error" data-password-error data-i18n="gate.error" hidden>密码不正确，请再试一次。</p>
        <button class="button primary" type="submit" data-i18n="gate.enter">进入大厅</button>
      </form>

      <div class="language-switch gate-language" aria-label="语言切换" data-i18n-aria-label="language.switchLabel">
        <button type="button" data-lang-button="zh">中文</button>
        <button type="button" data-lang-button="en">EN</button>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="language.js"></script>
</body>
</html>
